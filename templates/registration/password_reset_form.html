{% extends 'base.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h1>Reset Password</h1>

                <p>
                    Enter your email address below. If an account exists with that email,
                    a password reset link will be created.
                </p>

                <form method="post">
                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit" class="btn btn-primary">
                        Send Reset Link
                    </button>

                    <a href="{% url 'login' %}" class="btn btn-secondary">
                        Back to Login
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
