{% extends 'base.html' %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h1>Password Reset Complete</h1>

                <p>
                    Your password has been changed successfully.
                </p>

                <a href="{% url 'login' %}" class="btn btn-primary">
                    Go to Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
