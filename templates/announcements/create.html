{% extends 'base.html' %}

{% block title %}{{ page_title|default:"Create Announcement" }}{% endblock %}

{% block content %}
<h1>{{ page_title|default:"Create Announcement" }}</h1>

<div class="card">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success">
                {{ button_text|default:"Save Announcement" }}
            </button>

            <a href="{% url 'announcement_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
