{% extends 'base.html' %}
{% block title %}Register - Tewahedo Sunday{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header text-white" style="background-color:#8B0000;">Parent Registration</div>
            <div class="card-body">
                <p class="text-muted">Your account must be approved by an admin before you can access the app.</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="{% url 'login' %}">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
