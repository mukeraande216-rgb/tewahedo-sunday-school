{% extends 'base.html' %}

{% block title %}Create Account{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card">
            <div class="card-header">
                Create Account
            </div>

            <div class="card-body">
                <p class="text-muted">
                    Parents and students can create an account here. After registration, you can log in right away.
                </p>

                <form method="post">
                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit" class="btn btn-primary w-100">
                        Create Account
                    </button>
                </form>

                <div class="text-center mt-3">
                    <a href="{% url 'login' %}">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
