{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body">
                <h1 class="mb-3">Login</h1>

                <form method="post">
                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit" class="btn btn-primary w-100">
                        Login
                    </button>
                </form>

                <div class="mt-3 text-center">
                    <a href="{% url 'password_reset' %}">
                        Forgot password?
                    </a>
                </div>

                <div class="mt-2 text-center">
                    <a href="{% url 'register' %}">
                        Register as Parent
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
