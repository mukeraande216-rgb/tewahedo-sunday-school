{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body">
                <h1 class="mb-3 text-center">Login</h1>

                <p class="text-muted text-center">
                    Access classes, homework, attendance, resources, and messages.
                </p>

                <form method="post">
                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit" class="btn btn-primary w-100">
                        Login
                    </button>
                </form>

                <div class="mt-3 text-center">
                    <a href="{% url 'password_reset' %}">
                        Forgot password?
                    </a>
                </div>

                <hr>

                <div class="text-center">
    		     <h5>Sign up here</h5>

                     <p class="text-muted mb-3">
                     Parent or Student
                     </p>

                     <a href="{% url 'register' %}" class="btn btn-outline-primary w-100">
                     Create Account
                     </a>

                     <div class="mt-3">
                     <p class="text-muted mb-2">Scan QR Code</p>

                     <img
                     src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=https%3A%2F%2Fschool.sturaelchurch.org%2Faccounts%2Fregister%2F"
                     alt="Signup QR Code"
                     class="img-fluid"
                     >
                     </div>
                     </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
