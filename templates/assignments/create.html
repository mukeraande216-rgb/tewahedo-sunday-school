{% extends 'base.html' %}

{% block title %}Create Homework{% endblock %}

{% block content %}
<h1>Create Homework</h1>

<div class="card">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success">Save Homework</button>
            <a href="{% url 'assignment_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
